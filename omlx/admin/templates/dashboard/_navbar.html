<nav class="w-full py-3.5 px-6 border-b border-[#1e293b]/50 bg-[#0f172a] sticky top-0 z-50 flex items-center justify-between">
    <!-- Left: Tabs -->
    <div class="flex items-center gap-1">
        <!-- Dashboard Tab -->
        <button
            @click="setMainTab('status')"
            :class="mainTab === 'status'
                ? 'bg-amber-500/10 text-amber-400 border border-amber-500/20 font-medium'
                : 'text-slate-400 hover:text-white border border-transparent'"
            class="px-4 py-1.5 rounded-xl text-xs flex items-center gap-1.5 transition-all"
        >
            <i data-lucide="layout-dashboard" class="w-3.5 h-3.5"></i>
            <span>Dashboard</span>
        </button>

        <!-- Models Tab -->
        <div class="relative" @mouseenter="modelsDropdown = true" @mouseleave="modelsDropdown = false">
            <button
                @click="setMainTab('models')"
                :class="mainTab === 'models'
                    ? 'bg-amber-500/10 text-amber-400 border border-amber-500/20 font-medium'
                    : 'text-slate-400 hover:text-white border border-transparent'"
                class="px-4 py-1.5 rounded-xl text-xs flex items-center gap-1.5 transition-all"
            >
                <i data-lucide="database" class="w-3.5 h-3.5"></i>
                <span>Models</span>
            </button>
            <!-- Dropdown Menu -->
            <div
                x-show="modelsDropdown"
                x-transition
                class="absolute left-0 mt-1 w-40 bg-[#0f172a] border border-[#1e293b] rounded-xl py-1 z-50 shadow-xl"
                x-cloak
            >
                <button @click="setModelsTab('manager'); modelsDropdown = false" class="w-full px-3 py-1.5 text-left text-xs text-slate-300 hover:bg-slate-800 hover:text-white flex items-center gap-2">
                    <i data-lucide="folder" class="w-3.5 h-3.5"></i>
                    <span>Manager</span>
                </button>
                <button @click="setModelsTab('downloader'); modelsDropdown = false" class="w-full px-3 py-1.5 text-left text-xs text-slate-300 hover:bg-slate-800 hover:text-white flex items-center gap-2">
                    <i data-lucide="cloud-download" class="w-3.5 h-3.5"></i>
                    <span>Downloader</span>
                </button>
                <button @click="setModelsTab('quantizer'); modelsDropdown = false" class="w-full px-3 py-1.5 text-left text-xs text-slate-300 hover:bg-slate-800 hover:text-white flex items-center gap-2">
                    <i data-lucide="sparkles" class="w-3.5 h-3.5"></i>
                    <span>Quantizer</span>
                </button>
            </div>
        </div>

        <!-- Settings Tab -->
        <div class="relative" @mouseenter="settingsDropdown = true" @mouseleave="settingsDropdown = false">
            <button
                @click="setMainTab('settings')"
                :class="mainTab === 'settings'
                    ? 'bg-amber-500/10 text-amber-400 border border-amber-500/20 font-medium'
                    : 'text-slate-400 hover:text-white border border-transparent'"
                class="px-4 py-1.5 rounded-xl text-xs flex items-center gap-1.5 transition-all"
            >
                <i data-lucide="settings" class="w-3.5 h-3.5"></i>
                <span>Settings</span>
            </button>
            <!-- Dropdown Menu -->
            <div
                x-show="settingsDropdown"
                x-transition
                class="absolute left-0 mt-1 w-44 bg-[#0f172a] border border-[#1e293b] rounded-xl py-1 z-50 shadow-xl"
                x-cloak
            >
                <button @click="setSettingsTab('global'); settingsDropdown = false" class="w-full px-3 py-1.5 text-left text-xs text-slate-300 hover:bg-slate-800 hover:text-white flex items-center gap-2">
                    <i data-lucide="globe" class="w-3.5 h-3.5"></i>
                    <span>Global Settings</span>
                </button>
                <button @click="setSettingsTab('models'); settingsDropdown = false" class="w-full px-3 py-1.5 text-left text-xs text-slate-300 hover:bg-slate-800 hover:text-white flex items-center gap-2">
                    <i data-lucide="cpu" class="w-3.5 h-3.5"></i>
                    <span>Model Settings</span>
                </button>
                <button @click="setSettingsTab('integrations'); settingsDropdown = false" class="w-full px-3 py-1.5 text-left text-xs text-slate-300 hover:bg-slate-800 hover:text-white flex items-center gap-2">
                    <i data-lucide="plug" class="w-3.5 h-3.5"></i>
                    <span>Integrations</span>
                </button>
            </div>
        </div>

        <!-- Logs Tab -->
        <button
            @click="setMainTab('logs')"
            :class="mainTab === 'logs'
                ? 'bg-amber-500/10 text-amber-400 border border-amber-500/20 font-medium'
                : 'text-slate-400 hover:text-white border border-transparent'"
            class="px-4 py-1.5 rounded-xl text-xs flex items-center gap-1.5 transition-all"
        >
            <i data-lucide="scroll-text" class="w-3.5 h-3.5"></i>
            <span>Logs</span>
        </button>

        <!-- Bench Tab -->
        <div class="relative" @mouseenter="benchDropdown = true" @mouseleave="benchDropdown = false">
            <button
                @click="setMainTab('bench')"
                :class="mainTab === 'bench'
                    ? 'bg-amber-500/10 text-amber-400 border border-amber-500/20 font-medium'
                    : 'text-slate-400 hover:text-white border border-transparent'"
                class="px-4 py-1.5 rounded-xl text-xs flex items-center gap-1.5 transition-all"
            >
                <i data-lucide="gauge" class="w-3.5 h-3.5"></i>
                <span>Bench</span>
            </button>
            <div
                x-show="benchDropdown"
                x-transition
                class="absolute left-0 mt-1 w-40 bg-[#0f172a] border border-[#1e293b] rounded-xl py-1 z-50 shadow-xl"
                x-cloak
            >
                <button @click="setBenchTab('throughput'); benchDropdown = false" class="w-full px-3 py-1.5 text-left text-xs text-slate-300 hover:bg-slate-800 hover:text-white flex items-center gap-2">
                    <i data-lucide="zap" class="w-3.5 h-3.5"></i>
                    <span>Performance</span>
                </button>
                <button @click="setBenchTab('accuracy'); benchDropdown = false" class="w-full px-3 py-1.5 text-left text-xs text-slate-300 hover:bg-slate-800 hover:text-white flex items-center gap-2">
                    <i data-lucide="target" class="w-3.5 h-3.5"></i>
                    <span>Accuracy</span>
                </button>
            </div>
        </div>

        <!-- Chat Tab -->
        <a
            href="/admin/chat"
            :class="(typeof mainTab !== 'undefined' && mainTab === 'chat')
                ? 'bg-amber-500/10 text-amber-400 border border-amber-500/20 font-medium'
                : 'text-slate-400 hover:text-white border border-transparent'"
            class="px-4 py-1.5 rounded-xl text-xs flex items-center gap-1.5 transition-all"
        >
            <i data-lucide="message-circle" class="w-3.5 h-3.5"></i>
            <span>Chat</span>
        </a>
    </div>

    <!-- Right: URL Pill + Controls -->
    <div class="flex items-center gap-3">
        <!-- URL Display -->
        <div class="px-3 py-1 bg-slate-900 border border-[#1e293b] text-slate-400 text-xs font-mono rounded-lg select-all">
            http://127.0.0.1:8005
        </div>

        <!-- Theme Toggle -->
        <div class="relative" @mouseenter="themeDropdown = true" @mouseleave="themeDropdown = false">
            <button class="p-2 rounded-lg bg-slate-900 border border-[#1e293b] text-slate-400 hover:text-white hover:bg-slate-800 transition-colors">
                <i data-lucide="sun-moon" class="w-3.5 h-3.5" x-show="theme === 'auto'"></i>
                <i data-lucide="sun" class="w-3.5 h-3.5" x-show="theme === 'light'"></i>
                <i data-lucide="moon" class="w-3.5 h-3.5" x-show="theme === 'dark'"></i>
            </button>
            <div x-show="themeDropdown" x-transition class="absolute right-0 mt-1 w-32 bg-[#0f172a] border border-[#1e293b] rounded-xl py-1 z-50 shadow-xl" x-cloak>
                <button @click="setTheme('auto'); themeDropdown = false" class="w-full px-3 py-1.5 text-left text-xs text-slate-300 hover:bg-slate-800 hover:text-white">Auto</button>
                <button @click="setTheme('light'); themeDropdown = false" class="w-full px-3 py-1.5 text-left text-xs text-slate-300 hover:bg-slate-800 hover:text-white">Light</button>
                <button @click="setTheme('dark'); themeDropdown = false" class="w-full px-3 py-1.5 text-left text-xs text-slate-300 hover:bg-slate-800 hover:text-white">Dark</button>
            </div>
        </div>

        <!-- Refresh Button -->
        <button onclick="window.location.reload()" class="p-2 rounded-lg bg-slate-900 border border-[#1e293b] text-slate-400 hover:text-white hover:bg-slate-800 transition-colors" title="Reload Page">
            <i data-lucide="refresh-cw" class="w-3.5 h-3.5"></i>
        </button>

        <!-- Logout Button -->
        <button @click="logout" class="p-2 rounded-lg bg-slate-900 border border-[#1e293b] text-slate-400 hover:text-red-400 hover:bg-red-500/10 transition-colors" title="Logout">
            <i data-lucide="log-out" class="w-3.5 h-3.5"></i>
        </button>
    </div>
</nav>
