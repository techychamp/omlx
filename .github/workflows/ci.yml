name: CI Orchestrator
on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  architecture:
    uses: ./.github/workflows/architecture.yml

  python-tests:
    needs: [architecture]
    uses: ./.github/workflows/python-tests.yml

  swift-tests:
    needs: [architecture]
    uses: ./.github/workflows/swift-tests.yml

  packaging:
    needs: [architecture]
    uses: ./.github/workflows/packaging.yml

  runtime-smoke:
    needs: [packaging]
    uses: ./.github/workflows/runtime-smoke.yml

  performance:
    needs: [packaging]
    uses: ./.github/workflows/performance.yml
    with:
      strict: ${{ github.event_name != 'pull_request' }}

  security:
    needs: [architecture]
    uses: ./.github/workflows/security.yml

  docs:
    needs: [architecture]
    uses: ./.github/workflows/docs.yml

  release:
    needs: [python-tests, swift-tests, runtime-smoke, performance, security, docs]
    if: startsWith(github.ref, 'refs/tags/')
    uses: ./.github/workflows/release.yml
